<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gentle Steam, Dearly Belov'd</title>
    <link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div id="main-menu" class="game-container">
        <button class="credit-btn" onclick="toggleCredit()">?</button>
        <div class="logo-container">
            <img src="https://img2.pic.in.th/-181_20260411152816.md.png" alt="Logo" class="logo">
        </div>
        <div class="menu-buttons">
            <button class="btn btn-start" onclick="startGame()">START</button>
            <button class="btn btn-wishboard" onclick="alert('เร็วๆ นี้')">Wishboard</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <img id="character-sprite" src="https://i.postimg.cc/L6cBkSbS/Screenshot-20250805-145639-com-hihonor-photos-Slot-Album-Activity-edit-21745861399566.png" >

        <div id="choice-container"></div>

        <div class="ui-layer">
            <div id="name-tag"></div>
            <div id="textbox" onclick="nextStep()">
                <div id="text-content"></div>
            </div>
        </div>
    </div>
    
    <div id="creditOverlay" class="overlay" onclick="closeOverlay(event)">
        <div class="credit-content">
            <h2>ผู้สร้าง</h2>
            <p>Gentle Steam Team</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
