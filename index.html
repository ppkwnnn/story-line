<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gentle Steam, Dearly Belov'd</title>
    <link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cozy-brown: #7a5c48;
            --glass-white: rgba(255, 255, 255, 0.7);
            --shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            font-family: 'Fahkwang', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4ece4;
        }

        /* --- Main Menu --- */
        #main-menu {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://img2.pic.in.th/IMG_7825a630c755af16e393.md.jpeg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .logo {
            width: 300px;
            margin-bottom: 50px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            color: white;
            background-color: var(--cozy-brown);
            border: 2px solid white;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #5e4637;
        }

        .credit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--cozy-brown);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Game Screen --- */
        #game-container {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }

        #character-sprite {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 80%;
            display: none; /* Hidden by default */
            z-index: 2;
        }

        /* --- Dialogue UI --- */
        .ui-layer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        #name-tag {
            align-self: flex-start;
            margin-left: 10%;
            background: var(--cozy-brown);
            color: white;
            padding: 5px 25px;
            border-radius: 10px 10px 0 0;
            display: none;
            font-size: 1.1rem;
        }

        #textbox {
            width: 85%;
            min-height: 150px;
            background: var(--glass-white);
            padding: 25px;
            border-radius: 15px;
            color: var(--cozy-brown);
            font-size: 1.2rem;
            line-height: 1.6;
            text-shadow: var(--shadow);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        /* --- Choices --- */
        #choice-container {
            position: absolute;
            top: 40%;
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
        }

        .choice-btn {
            width: 60%;
            background: var(--glass-white);
            color: var(--cozy-brown);
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
            transition: 0.2s;
        }

        .choice-btn:hover {
            background: white;
            transform: scale(1.02);
        }

        /* Utils */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-menu">

        <div class="menu-buttons">

            <div class="btn" onclick="alert('หน้ารวมคำอวยพร (Coming Soon)')">ดูหน้ารวมคำอวยพร</div>
        </div>

            <div id="textbox" onclick="nextStep()">

            12: {
                bg: 'https://img2.pic.in.th/IMG_7825a630c755af16e393.md.jpeg',
                narration: 'คุณเดินออกจากร้านพร้อมกับหัวใจที่เบาสบายขึ้นอย่างประหลาด ความเหนื่อยล้าที่สะสมมาทั้งสัปดาห์ดูจะจางหายไป เพียงเพราะเครื่องดื่มหนึ่งแก้ว... และรอยยิ้มที่แสนอ่อนโยนจากบาริสต้าที่ชื่อ "เคียวมุ"',
                next: 'MENU'
            }
        };

        let currentScene = 1;
        let dialogueIndex = 0;
        let selectedDrink = "";
        let selectedSnack = "";
        let isTyping = false;

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            renderScene();
        }

        function renderScene() {
            const scene = gameData[currentScene];
            if (!scene) return;

            // Set Background
            document.getElementById('game-container').style.backgroundImage = `url('${scene.bg}')`;
            
            // Character Sprite
            const charSprite = document.getElementById('character-sprite');
            if (scene.showChar) {
                charSprite.style.display = 'block';
            } else {
                charSprite.style.display = 'none';
            }

            dialogueIndex = 0;
            processStep();
        }

        function processStep() {
            const scene = gameData[currentScene];
            const choiceCont = document.getElementById('choice-container');
            choiceCont.style.display = 'none';

            // Check Narration
            if (scene.narration && dialogueIndex === 0) {
                showText(scene.narration, null);
                return;
            }

            // Check Dialogue Array or Object
            let currentDialogue = null;
            if (Array.isArray(scene.dialogue)) {
                currentDialogue = scene.dialogue[dialogueIndex];
            } else if (scene.dialogue) {
                currentDialogue = scene.dialogue;
            }

            if (currentDialogue) {
                if (currentDialogue.showChar) {
                    document.getElementById('character-sprite').style.display = 'block';
                }
                let text = currentDialogue.text.replace('[DRINK]', selectedDrink).replace('[SNACK]', selectedSnack);
                showText(text, currentDialogue.name);
            } else if (scene.choices) {
                showChoices(scene.choices);
            } else if (scene.next) {
                if(scene.next === 'MENU') location.reload();
                else {
                    currentScene = scene.next;
                    renderScene();
                }
            }
        }

        function showText(text, name) {
            isTyping = true;
            const nameTag = document.getElementById('name-tag');
            const textContent = document.getElementById('text-content');
            
            if (name) {
                nameTag.innerText = name;
                nameTag.style.display = 'block';
            } else {
                nameTag.style.display = 'none';
            }

            textContent.innerHTML = "";
            let i = 0;
            const speed = 40;
            
            function type() {
                if (i < text.length) {
                    textContent.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    isTyping = false;
                }
            }
            type();
        }

        function showChoices(choices) {
            const choiceCont = document.getElementById('choice-container');
            choiceCont.innerHTML = "";
            choiceCont.style.display = 'flex';

            choices.forEach(c => {
                const div = document.createElement('div');
                div.className = 'choice-btn';
                div.innerText = c.text;
                div.onclick = () => {
                    if (c.val) {
                        if (currentScene === 5) selectedDrink = c.val;
                        if (currentScene === 'choice_snack') selectedSnack = c.val;
                    }
                    if (c.next === 'MENU') location.reload();
                    else if (c.next === 'choice_drink') {
                        currentScene = 'choice_temp';
                        renderScene();
                    }
                    else {
                        currentScene = c.next;
                        renderScene();
                    }
                };
                choiceCont.appendChild(div);
            });
        }

        function nextStep() {
            if (isTyping) return;
            
            const scene = gameData[currentScene];
            
            // If it's an array of dialogues
            if (Array.isArray(scene.dialogue) && dialogueIndex < scene.dialogue.length - 1) {
                dialogueIndex++;
                processStep();
                return;
            }

            // After dialogues, check for choices in the same scene
            if (scene.choices && document.getElementById('choice-container').style.display === 'none') {
                showChoices(scene.choices);
                return;
            }

            // Move to next scene
            if (scene.next) {
                if(scene.next === 'MENU') location.reload();
                else {
                    currentScene = scene.next;
                    renderScene();
                }
            }
        }
    </script>
</body>
</html>
